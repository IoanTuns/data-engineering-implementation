# The main pipeline for dataDP

resources:
  
  pipelines:
    dataDP_etl:
      name: dataDP_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/dataDP_etl"

      libraries:
        - glob:
            include: ../src/dataDP_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
